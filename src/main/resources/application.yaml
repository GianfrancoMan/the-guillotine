spring:

  application:
    name: the-guillotine

  security:
    jwt:
      secret: ${KEY256}
      expiration: 3600000

  datasource:
    url: jdbc:postgresql://localhost:5432/guillotinedb
    username: gianfo
    password: pstgrpsw
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: public
    default-schema: public
    fail-on-missing-locations: true

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
        format_sql: true


server:
  port: 8080

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [%X{correlationId}] - %msg%n"
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    org.springframework.transaction: debug
    org.flywaydb: debug
    org.springframework.boot.autoconfigure.flyway: debug
    org.springframework.security.authentication: debug
    org.springframework.security.authorization: debug
    org.springframework.security.jackson: debug


